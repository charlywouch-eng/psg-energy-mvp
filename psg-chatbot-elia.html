<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Élia — Assistante PSG Energy</title>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700;800;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --blue:#1A4DFF;--blueL:#EBF0FF;--blueM:#C5D3FF;--blueD:#0F30CC;
  --green:#00C48C;--greenL:#E5FBF4;
  --gold:#F5A000;--goldL:#FFF5E0;
  --red:#FF3B55;--redL:#FFF0F2;
  --purple:#7C3AED;--purpleL:#F3EFFE;
  --ink:#08091A;--ink2:#374060;--ink3:#7480A0;
  --bdr:#E2E8F4;--bdr2:#C8D4EC;
  --surf:#F2F5FB;--w:#fff;--off:#F7F9FC;
  --ff:'Outfit',sans-serif;--fb:'Inter',sans-serif;
  --r:16px;--r2:10px;--sh:0 2px 16px rgba(26,77,255,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;overflow:hidden;}
body{font-family:var(--fb);background:var(--off);color:var(--ink);-webkit-font-smoothing:antialiased;}

/* ── LAYOUT ── */
.app{display:flex;flex-direction:column;height:100vh;max-width:480px;margin:0 auto;background:var(--w);position:relative;}

/* ── HEADER ── */
.header{background:linear-gradient(135deg,#071232 0%,#1A4DFF 100%);padding:12px 16px 14px;flex-shrink:0;position:relative;overflow:hidden;}
.header::after{content:'';position:absolute;top:-40px;right:-40px;width:150px;height:150px;background:rgba(255,255,255,.04);border-radius:50%;}
.header-top{display:flex;align-items:center;gap:11px;}
.avatar{width:42px;height:42px;border-radius:50%;background:linear-gradient(135deg,var(--green),#00A878);display:flex;align-items:center;justify-content:center;font-family:var(--ff);font-size:17px;font-weight:900;color:#fff;flex-shrink:0;position:relative;box-shadow:0 0 0 3px rgba(255,255,255,.15);}
.avatar-dot{position:absolute;bottom:1px;right:1px;width:10px;height:10px;background:var(--green);border-radius:50%;border:2px solid #071232;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(0,196,140,.6)}50%{box-shadow:0 0 0 5px rgba(0,196,140,0)}}
.agent-info{flex:1;}
.agent-name{font-family:var(--ff);font-size:16px;font-weight:800;color:#fff;line-height:1;}
.agent-role{font-size:11px;color:rgba(255,255,255,.65);margin-top:2px;}
.header-badges{display:flex;gap:6px;margin-top:10px;}
.hb{padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700;background:rgba(255,255,255,.1);color:rgba(255,255,255,.8);border:1px solid rgba(255,255,255,.15);}
.hb-g{background:rgba(0,196,140,.15);color:#80FFD8;border-color:rgba(0,196,140,.25);}
.header-action{background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.2);border-radius:8px;padding:7px 12px;font-size:11px;font-weight:700;color:rgba(255,255,255,.8);cursor:pointer;font-family:var(--ff);transition:all .2s;}
.header-action:hover{background:rgba(255,255,255,.2);}

/* ── MESSAGES ── */
.messages{flex:1;overflow-y:auto;padding:16px 14px;scroll-behavior:smooth;}
.messages::-webkit-scrollbar{width:4px;}
.messages::-webkit-scrollbar-track{background:transparent;}
.messages::-webkit-scrollbar-thumb{background:var(--bdr2);border-radius:2px;}

/* ── MESSAGE BUBBLES ── */
.msg{display:flex;gap:9px;margin-bottom:14px;animation:fadeUp .3s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg.user{flex-direction:row-reverse;}
.msg-av{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:800;font-family:var(--ff);flex-shrink:0;margin-top:2px;}
.msg-av.bot{background:linear-gradient(135deg,var(--green),#00A878);color:#fff;}
.msg-av.user{background:var(--blue);color:#fff;}
.msg-body{max-width:82%;}
.msg-name{font-size:10px;font-weight:700;color:var(--ink3);margin-bottom:4px;letter-spacing:.03em;}
.msg.user .msg-name{text-align:right;}
.bubble{padding:12px 14px;border-radius:16px;font-size:13px;line-height:1.65;position:relative;}
.bubble.bot{background:var(--w);border:1px solid var(--bdr);border-radius:4px 16px 16px 16px;box-shadow:var(--sh);}
.bubble.user{background:linear-gradient(135deg,var(--blue),var(--blueD));color:#fff;border-radius:16px 4px 16px 16px;}
.bubble.bot b{font-weight:700;color:var(--ink);}
.bubble.user b{color:rgba(255,255,255,.9);}
.bubble-time{font-size:10px;color:var(--ink3);margin-top:4px;}
.msg.user .bubble-time{text-align:right;}

/* ── RICH CONTENT IN BUBBLES ── */
.aide-card{background:var(--blueL);border:1.5px solid var(--blueM);border-radius:var(--r2);padding:11px;margin:8px 0;font-size:12px;}
.aide-card-title{font-family:var(--ff);font-size:13px;font-weight:800;margin-bottom:5px;color:var(--ink);}
.aide-row{display:flex;justify-content:space-between;padding:4px 0;border-bottom:1px solid rgba(26,77,255,.08);font-size:11px;}
.aide-row:last-child{border:none;padding-bottom:0;}
.aide-lbl{color:var(--ink3);}
.aide-val{font-weight:700;font-family:var(--ff);}
.aide-green{color:var(--green);}
.aide-blue{color:var(--blue);}
.aide-gold{color:var(--gold);}

.step-list{margin:8px 0;}
.step-item{display:flex;gap:9px;padding:7px 0;border-bottom:1px solid var(--bdr);font-size:12px;line-height:1.55;}
.step-item:last-child{border:none;}
.step-num{width:22px;height:22px;border-radius:50%;background:var(--blue);color:#fff;font-family:var(--ff);font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.step-num.done{background:var(--green);}

.pill-row{display:flex;flex-wrap:wrap;gap:5px;margin:7px 0;}
.pill{padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;}
.pill-b{background:var(--blueL);color:var(--blue);}
.pill-g{background:var(--greenL);color:#007A5C;}
.pill-o{background:var(--goldL);color:#A06800;}
.pill-r{background:var(--redL);color:var(--red);}
.pill-p{background:var(--purpleL);color:var(--purple);}

.alert-box{border-radius:var(--r2);padding:10px 12px;margin:8px 0;font-size:12px;display:flex;gap:8px;align-items:flex-start;}
.alert-warn{background:#FFF8E6;border:1px solid #FFD070;}
.alert-info{background:var(--blueL);border:1px solid var(--blueM);}
.alert-ok{background:var(--greenL);border:1px solid #B0ECD9;}
.alert-ico{font-size:16px;flex-shrink:0;margin-top:1px;}
.alert-txt{font-size:11px;line-height:1.6;color:var(--ink2);}

.cta-row{display:flex;gap:7px;margin-top:10px;}
.cta-btn{flex:1;padding:10px 8px;border-radius:var(--r2);font-family:var(--ff);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .18s;}
.cta-bb{background:var(--blue);color:#fff;}
.cta-bb:hover{background:var(--blueD);}
.cta-bo{background:var(--w);color:var(--blue);border:1.5px solid var(--blue);}
.cta-bo:hover{background:var(--blueL);}

/* ── TYPING INDICATOR ── */
.typing{display:flex;align-items:center;gap:4px;padding:12px 14px;background:var(--w);border:1px solid var(--bdr);border-radius:4px 16px 16px 16px;box-shadow:var(--sh);width:fit-content;}
.typing-wave{display:flex;gap:3px;align-items:flex-end;height:16px;}
.tw{width:4px;border-radius:2px;background:var(--blue);animation:wave 1.2s ease-in-out infinite;}
.tw:nth-child(1){animation-delay:0s;}
.tw:nth-child(2){animation-delay:.15s;}
.tw:nth-child(3){animation-delay:.3s;}
.tw:nth-child(4){animation-delay:.45s;}
.tw:nth-child(5){animation-delay:.6s;}
@keyframes wave{
  0%,100%{height:4px;background:var(--blueM);}
  50%{height:16px;background:var(--blue);}
}
.typing-lbl{font-size:11px;color:var(--ink3);font-weight:600;margin-left:4px;}

/* ── SUGGESTIONS RAPIDES ── */
.suggestions{padding:8px 14px;display:flex;gap:7px;overflow-x:auto;flex-shrink:0;background:var(--w);border-top:1px solid var(--bdr);}
.suggestions::-webkit-scrollbar{display:none;}
.sug{padding:7px 13px;border-radius:20px;font-size:12px;font-weight:600;background:var(--blueL);color:var(--blue);border:1.5px solid var(--blueM);cursor:pointer;white-space:nowrap;transition:all .18s;font-family:var(--ff);}
.sug:hover{background:var(--blue);color:#fff;border-color:var(--blue);}

/* ── INPUT ── */
.input-area{padding:10px 14px 12px;background:var(--w);border-top:1px solid var(--bdr);flex-shrink:0;padding-bottom:max(12px,env(safe-area-inset-bottom));}
.input-row{display:flex;gap:9px;align-items:flex-end;}
.input-wrap{flex:1;background:var(--off);border:1.5px solid var(--bdr2);border-radius:20px;display:flex;align-items:flex-end;padding:0 12px;transition:border .2s;min-height:42px;}
.input-wrap:focus-within{border-color:var(--blue);background:var(--w);}
.chat-input{flex:1;border:none;background:transparent;resize:none;font-family:var(--fb);font-size:14px;color:var(--ink);outline:none;padding:11px 0;max-height:100px;line-height:1.4;}
.chat-input::placeholder{color:var(--ink3);}
.attach-btn{background:none;border:none;font-size:17px;cursor:pointer;padding:4px;color:var(--ink3);transition:color .2s;align-self:center;}
.attach-btn:hover{color:var(--blue);}
.send-btn{width:42px;height:42px;border-radius:50%;background:var(--blue);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:17px;transition:all .18s;flex-shrink:0;}
.send-btn:hover{background:var(--blueD);transform:scale(1.05);}
.send-btn:active{transform:scale(.95);}
.send-btn:disabled{background:var(--bdr2);cursor:not-allowed;transform:none;}

/* ── TOPICS MENU ── */
.topics{padding:6px 14px 8px;background:var(--w);}
.topics-lbl{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:7px;}
.topics-grid{display:grid;grid-template-columns:1fr 1fr;gap:6px;}
.topic-btn{padding:9px 11px;border-radius:10px;background:var(--off);border:1.5px solid var(--bdr);font-size:11px;font-weight:700;color:var(--ink2);cursor:pointer;text-align:left;transition:all .18s;font-family:var(--ff);display:flex;align-items:center;gap:6px;}
.topic-btn:hover{border-color:var(--blue);color:var(--blue);background:var(--blueL);}
.topic-ico{font-size:15px;}

/* ── WELCOME ── */
.welcome{padding:4px 0 8px;}
.welcome-hero{background:linear-gradient(135deg,#071232,#1A4DFF);border-radius:var(--r);padding:18px 16px;margin-bottom:12px;position:relative;overflow:hidden;}
.welcome-hero::after{content:'';position:absolute;top:-30px;right:-30px;width:100px;height:100px;background:rgba(255,255,255,.05);border-radius:50%;}
.welcome-title{font-family:var(--ff);font-size:18px;font-weight:900;color:#fff;margin-bottom:5px;}
.welcome-sub{font-size:12px;color:rgba(255,255,255,.7);line-height:1.6;}
.welcome-stats{display:flex;gap:14px;margin-top:12px;}
.ws{text-align:center;}
.ws-val{font-family:var(--ff);font-size:18px;font-weight:900;color:#fff;}
.ws-lbl{font-size:9px;color:rgba(255,255,255,.55);font-weight:700;text-transform:uppercase;}
.welcome-topics{font-family:var(--ff);font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;color:var(--ink3);margin-bottom:7px;}

/* ── RESET / SHARE ── */
.msg-actions{display:flex;gap:6px;margin-top:6px;}
.msg-act{background:none;border:none;font-size:11px;color:var(--ink3);cursor:pointer;display:flex;align-items:center;gap:3px;padding:3px 7px;border-radius:20px;transition:all .18s;font-family:var(--ff);font-weight:600;}
.msg-act:hover{background:var(--bdr);color:var(--ink2);}

/* ── TOAST ── */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(10px);opacity:0;background:var(--ink);color:#fff;padding:10px 16px;border-radius:100px;font-size:12px;font-weight:700;z-index:800;transition:all .3s;white-space:nowrap;pointer-events:none;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

/* ── SCROLLBAR ── */
.messages{scrollbar-width:thin;scrollbar-color:var(--bdr2) transparent;}
</style>
</head>
<body>

<div class="app">
  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="avatar">É<div class="avatar-dot"></div></div>
      <div class="agent-info">
        <div class="agent-name">Élia · Assistante PSG Energy</div>
        <div class="agent-role">Experte aides ANAH · MaPrimeRénov 2026</div>
      </div>
      <button class="header-action" onclick="resetChat()">↺ Nouveau</button>
    </div>
    <div class="header-badges">
      <div class="hb hb-g">● En ligne</div>
      <div class="hb">📋 ANAH 2026</div>
      <div class="hb">🔒 Confidentiel</div>
      <div class="hb">🌍 6 langues</div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages" id="messages"></div>

  <!-- SUGGESTIONS RAPIDES -->
  <div class="suggestions" id="suggestions">
    <button class="sug" onclick="sendSug(this)">💰 Mes aides disponibles</button>
    <button class="sug" onclick="sendSug(this)">♨️ Pompe à chaleur</button>
    <button class="sug" onclick="sendSug(this)">🏡 Rénovation globale</button>
    <button class="sug" onclick="sendSug(this)">☀️ Panneaux solaires</button>
    <button class="sug" onclick="sendSug(this)">📅 RDV gratuit</button>
    <button class="sug" onclick="sendSug(this)">🧱 Isolation</button>
    <button class="sug" onclick="sendSug(this)">💧 Chauffe-eau</button>
    <button class="sug" onclick="sendSug(this)">🔌 Borne VE</button>
  </div>

  <!-- INPUT -->
  <div class="input-area">
    <div class="input-row">
      <div class="input-wrap">
        <button class="attach-btn" onclick="showTopics()" title="Thèmes">☰</button>
        <textarea class="chat-input" id="chatInput" placeholder="Posez votre question sur vos aides énergie..." rows="1"
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
      </div>
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
/* ═══════════════════════════════════════════════════
   PSG ENERGY — CHATBOT ÉLIA
   Agent conversationnel ANAH / MaPrimeRénov 2026
   Base de connaissances intégrée + API Claude
═══════════════════════════════════════════════════ */

// ── ÉTAT ──────────────────────────────────────────
let history = [];
let isTyping = false;
let userProfile = {};

// ── BASE DE CONNAISSANCES ANAH 2026 ───────────────
const ANAH_KNOWLEDGE = `
Tu es Élia, l'assistante virtuelle experte de PSG Energy, spécialisée dans les aides ANAH et MaPrimeRénov 2026.

RÈGLES DE COMPORTEMENT :
- Tu es chaleureuse, précise, professionnelle et pédagogue
- Tu poses des questions pour mieux qualifier le profil de l'utilisateur
- Tu n'inventes jamais de chiffres : tu utilises uniquement les données ci-dessous
- Tu recommandes toujours un RDV gratuit avec PSG Energy à la fin de chaque réponse
- Tu réponds en français par défaut, mais tu peux détecter et répondre en arabe, anglais, portugais, turc ou mandarin si l'utilisateur écrit dans ces langues
- Tu utilises des émojis avec parcimonie pour rendre les réponses lisibles sur mobile
- Tu structures tes réponses avec des tirets ou des paragraphes courts
- Si tu ne sais pas quelque chose de précis, tu dis "Je vous recommande de vérifier sur aides-travaux.gouv.fr ou avec notre conseiller"

=== DONNÉES OFFICIELLES ANAH / MaPrimeRÉNOV 2026 ===

TRANCHES DE REVENUS 2026 (ménage 1 personne, Île-de-France) :
- Tranche 1 "Très modeste" : RFR < 21 805 €
- Tranche 2 "Modeste" : RFR < 26 939 €
- Tranche 3 "Intermédiaire" : RFR < 40 018 €
- Tranche 4 "Supérieur" : RFR ≥ 40 018 €
(Pour 2 personnes IDF : T1 < 32 084 €, T2 < 39 569 €, T3 < 58 983 €)

POMPE À CHALEUR AIR/EAU (PAC) :
- Tranche 1 Très modeste : jusqu'à 12 000 € MPR + 3 500 € CEE = 15 500 €
- Tranche 2 Modeste : jusqu'à 7 000 € MPR + 2 200 € CEE = 9 200 €
- Tranche 3 Intermédiaire : jusqu'à 4 000 € MPR + 1 600 € CEE = 5 600 €
- Tranche 4 Supérieur : jusqu'à 1 500 € MPR + 800 € CEE = 2 300 €
- Bonus sortie passoire (+1 500 €) si DPE F ou G
- TVA réduite 5,5 %
- Éco-PTZ jusqu'à 50 000 € (taux 0 %)
- Conditions : installation par RGE QualiPAC, maison de +15 ans, résidence principale

RÉNOVATION GLOBALE (multi-travaux) :
- Tranche 1 : jusqu'à 70 % du coût plafonné, max 20 000 € MPR + bonus 10 %
- Tranche 2 : jusqu'à 50 % max 15 000 € MPR + bonus 10 %
- Tranche 3 : jusqu'à 30 % max 10 000 € MPR
- Tranche 4 : jusqu'à 15 % max 5 000 € MPR
- OBLIGATION : 2 gestes minimum, gain énergétique ≥ 2 classes DPE
- Mon Accompagnateur Rénov (MAR) obligatoire pour aides > 5 000 €
- Cumul avec CEE, Éco-PTZ 50 000 €, TVA 5,5 %

PANNEAUX PHOTOVOLTAÏQUES :
- MaPrimeRénov NON applicable aux PV seuls (sauf dans rénovation globale)
- Prime d'autoconsommation EDF OA 2026 : environ 1 530 € pour 3 kWc, 2 100 € pour 6 kWc
- TVA 5,5 % sur la pose
- Obligation de raccordement Enedis (délai ~3 mois)
- RGE QualiSOL ou Qualifelec requis

ISOLATION THERMIQUE :
- Isolation combles perdus T1 : jusqu'à 7 000 € MPR + CEE 2 500 €
- Isolation combles T2 : jusqu'à 5 000 € MPR + CEE 1 800 €
- Isolation murs par l'extérieur : majoration 20 % vs combles
- RGE Qualibat ou QualiPAC requis

CHAUFFE-EAU THERMODYNAMIQUE (CET) :
- T1 : jusqu'à 1 200 € MPR + 400 € CEE
- T2 : jusqu'à 800 € MPR + 300 € CEE
- T3 : jusqu'à 400 € MPR + 200 € CEE
- Fab. française exigée pour MPR
- RGE QualiPAC requis

BORNE DE RECHARGE VE :
- Crédit ADVENIR : 50 % du coût plafonné à 960 € pour particulier
- Crédit d'impôt : 75 % pour résidence principale
- Certification IRVE (AFNOR) obligatoire pour l'installateur

RÈGLES DE CUMUL :
- MPR + CEE : OUI (cumulables)
- MPR + Éco-PTZ : OUI (cumulables depuis 2022)
- MPR + TVA 5,5 % : OUI
- MPR + Ma Prime Logement Décent : sous conditions
- MPR + Aides locales (Région, Département, communes) : OUI
- MPR si travaux déjà commencés : NON — commande APRÈS obtention accord ANAH

CONDITIONS GÉNÉRALES D'ÉLIGIBILITÉ MPR :
✓ Propriétaire occupant OU bailleur OU syndicat copropriété
✓ Logement de +15 ans (date de construction)
✓ Résidence principale (occupée +8 mois/an)
✓ Travaux réalisés par artisan RGE certifié
✓ Demande AVANT le début des travaux (sur monprojet.anah.gouv.fr)
✗ Locations saisonnières exclues
✗ Logements neufs exclus
✗ Marchands de biens exclus

PASSOIRE THERMIQUE (DPE F ou G) :
- Bonus passoire : +1 500 € sur certains travaux
- Depuis 2025 : DPE G interdit à la location (nouvelles locations)
- Depuis 2028 : DPE F interdit à la location
- Depuis 2034 : DPE E interdit à la location
- Forte incitation à rénover pour maintenir valeur locative

DÉLAIS ET PROCESSUS ANAH :
1. Simulation en ligne (monprojet.anah.gouv.fr)
2. Dépôt dossier (délai traitement : 4-8 semaines)
3. Accord de financement reçu
4. Signature bon de commande avec installateur RGE
5. Travaux réalisés (3-6 semaines après accord)
6. Paiement et demande de versement MPR
7. Versement ANAH sous 4-6 semaines après réception

ACCOMPAGNATEUR RÉNOV (MAR) - OBLIGATOIRE si > 5 000 € MPR :
- Gratuit pour T1 et T2
- 50 % pris en charge pour T3
- PSG Energy peut orienter vers un MAR agréé

PSG ENERGY — QUI NOUS SOMMES :
- Régie commerciale en énergies renouvelables
- Partenaires installateurs RGE : Kwanthic, Le Solariste
- Zone : Île-de-France (77, 94, 91, 93)
- Service gratuit : simulation, dossier ANAH, mise en relation installateur
- Rémunération : marge sur le prix des équipements (jamais de frais client)
- Contact : contact@psg-energy.fr

FORMAT DE RÉPONSE :
- Réponds toujours avec un ton chaleureux et accessible
- Utilise des émojis pertinents (pas excessif)
- Propose toujours une action concrète (simulation, RDV, prochain sujet)
- Si l'utilisateur mentionne son code postal ou son département, personalise la réponse IDF
- Détecte si la question concerne les droits (informe), le processus (guide étape par étape), ou le chiffrage (donne les montants précis)
`;

// ── RÉPONSES INTELLIGENTES (sans API) ─────────────
const LOCAL_RESPONSES = {
  'pac|pompe|chaleur|chauffage': async(msg) => replyPAC(msg),
  'reno|rénovation|globale|multi': async(msg) => replyReno(msg),
  'solaire|photovoltaique|pv|panneaux': async(msg) => replyPV(msg),

// ── DÉTECTION LOCALE ───────────────────────────────
function detectLocal(msg) {
  const m = msg.toLowerCase();
  for(const [pattern, fn] of Object.entries(LOCAL_RESPONSES)) {
    const regex = new RegExp(pattern, 'i');
    if(regex.test(m)) return fn(msg);
  }
  return null;
}

// ── APPEL API CLAUDE ───────────────────────────────
async function callClaude(userMsg) {
  const messages = [
    ...history.map(h => ({role: h.role, content: h.content})),
    {role: 'user', content: userMsg}
  ];

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      model: 'claude-sonnet-4-6',
      max_tokens: 1000,
      system: ANAH_KNOWLEDGE,
      messages: messages
    })
  });

  if(!response.ok) throw new Error('API error ' + response.status);
  const data = await response.json();
  return data.content?.[0]?.text || 'Désolé, je n\'ai pas pu générer une réponse.';
}

// ── AFFICHAGE MESSAGES ────────────────────────────
function addMessage(role, content, rich='', followup='') {
  const ms = document.getElementById('messages');
  const now = new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
  const isBot = role === 'assistant';

  const div = document.createElement('div');
  div.className = `msg ${isBot ? 'bot' : 'user'}`;

  let richHtml = '';
  if(rich) richHtml = rich;

  let followupHtml = '';
  if(followup && isBot) {
    followupHtml = `<div class="bubble bot" style="margin-top:8px;background:var(--surf);border-style:dashed;">${followup}</div>`;
  }

  let actionsHtml = '';
  if(isBot) {
    actionsHtml = `<div class="msg-actions">
      <button class="msg-act" onclick="copyMsg(this)" title="Copier">📋 Copier</button>
      <button class="msg-act" onclick="thumbsUp(this)" title="Utile">👍</button>
      <button class="msg-act" onclick="thumbsDown(this)" title="Pas utile">👎</button>
    </div>`;
  }

  const bubbleContent = typeof content === 'string'
    ? content.replace(/\*\*(.*?)\*\*/g, '<b>$1</b>').replace(/\n/g,'<br>')
    : content;

  div.innerHTML = `
    <div class="msg-av ${isBot?'bot':'user'}">${isBot?'É':'👤'}</div>
    <div class="msg-body">
      <div class="msg-name">${isBot?'Élia · PSG Energy':'Vous'}</div>
      <div class="bubble ${isBot?'bot':'user'}">${bubbleContent}${rich}</div>
      ${followupHtml}
      <div class="bubble-time">${now}</div>
      ${actionsHtml}
    </div>`;

  ms.appendChild(div);
  ms.scrollTop = ms.scrollHeight;
}

function showTyping() {
  const ms = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = 'msg bot';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="msg-av bot">É</div>
    <div class="msg-body">
      <div class="msg-name">Élia · PSG Energy</div>
      <div class="typing">
        <div class="typing-wave">
          <div class="tw"></div><div class="tw"></div><div class="tw"></div>
          <div class="tw"></div><div class="tw"></div>
        </div>
        <div class="typing-lbl">Élia rédige...</div>
      </div>
    </div>`;
  ms.appendChild(div);
  ms.scrollTop = ms.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if(el) el.remove();
}

// ── ENVOYER MESSAGE ────────────────────────────────
async function sendMessage() {
  const input = document.getElementById('chatInput');
  const msg = input.value.trim();
  if(!msg || isTyping) return;

  input.value = '';
  input.style.height = 'auto';
  isTyping = true;
  document.getElementById('sendBtn').disabled = true;

  // Afficher message utilisateur
  addMessage('user', msg);
  history.push({role:'user', content: msg});

  // Afficher typing
  showTyping();

  try {
    // Délai réaliste
    await new Promise(r => setTimeout(r, 800 + Math.random()*700));

    // Essayer la réponse locale d'abord
    const local = await detectLocal(msg);

    if(local) {
      hideTyping();
      if(typeof local === 'object') {
        addMessage('assistant', local.text, local.rich || '', local.followup || '');
        history.push({role:'assistant', content: local.text + (local.followup ? '\n\n' + local.followup : '')});
      } else {
        addMessage('assistant', local);
        history.push({role:'assistant', content: local});
      }
    } else {
      // Appel API Claude
      const reply = await callClaude(msg);
      hideTyping();
      addMessage('assistant', reply);
      history.push({role:'assistant', content: reply});
    }
  } catch(err) {
    hideTyping();
    const fallback = `Je rencontre une difficulté technique momentanée. 😕

Pour toute question sur vos aides ANAH, vous pouvez :
- **Appeler PSG Energy** directement
- **Utiliser notre simulateur** gratuit en ligne

Nos conseillers vous répondent **lundi-samedi, 8h-19h**.`;
    addMessage('assistant', fallback);
    history.push({role:'assistant', content: fallback});
  }

  isTyping = false;
  document.getElementById('sendBtn').disabled = false;
  updateSuggestions();
}

// ── SUGGESTIONS CONTEXTUELLES ────────────────────
function updateSuggestions() {
  const lastBot = history.filter(h=>h.role==='assistant').slice(-1)[0];
  if(!lastBot) return;
  const c = lastBot.content.toLowerCase();
  let sugs = [];

  if(c.includes('pac') || c.includes('pompe')) {
    sugs = ['📋 Conditions éligibilité PAC','💰 Mon aide PAC précise','📅 RDV PAC gratuit'];
  } else if(c.includes('rénov') || c.includes('global')) {
    sugs = ['📋 Conditions rénovation globale','🔢 Calculer 2 gestes','📅 Audit rénovation'];
  } else if(c.includes('solaire') || c.includes('pv')) {
    sugs = ['📋 Conditions PV','💡 Combiner PV et PAC','📅 Devis solaire'];
  } else if(c.includes('isolation')) {
    sugs = ['📋 Types d\'isolation','💰 Isolation + PAC','📅 Audit isolation'];
  } else {
    sugs = ['💰 Mes aides disponibles','📋 Processus ANAH','📅 RDV gratuit','🏠 Mon éligibilité'];
  }

  const sugDiv = document.getElementById('suggestions');
  sugDiv.innerHTML = sugs.map(s =>
    `<button class="sug" onclick="sendSug(this)">${s}</button>`
  ).join('') + `<button class="sug" onclick="sendSug(this)">🔄 Autre question</button>`;
}

// ── ACTIONS ───────────────────────────────────────
function sendSug(btn) {
  document.getElementById('chatInput').value = btn.textContent.trim();
  sendMessage();
}

function handleKey(e) {
  if(e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function copyMsg(btn) {
  const bubble = btn.closest('.msg-body').querySelector('.bubble');
  navigator.clipboard?.writeText(bubble.innerText).catch(()=>{});
  t('✅ Copié dans le presse-papier');
}

function thumbsUp(btn) {
  btn.textContent = '👍 Merci !';
  btn.style.color = 'var(--green)';
  t('👍 Avis envoyé — merci !');
}

function thumbsDown(btn) {
  btn.textContent = '👎 Noté';

}
